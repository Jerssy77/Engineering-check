services:
  - type: web
    name: property-review-api
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: AI_PROVIDER
        value: auto
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL_NAME
        sync: false
      - key: AI_API_TIMEOUT_MS
        value: 120000
      - key: APP_TIMEZONE
        value: Asia/Shanghai
      - key: APP_DATA_FILE
        value: /opt/render/project/src/runtime-data/app-state.json
      - key: APP_UPLOAD_DIR
        value: /opt/render/project/src/runtime-data/uploads
      - key: PDF_FONT_PATH
        value: /opt/render/project/src/apps/api/assets/fonts/NotoSansSC-Regular.otf
    buildFilter:
      paths:
        - apps/api/**
        - packages/shared/**
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - scripts/build-all.mjs
  - type: web
    name: property-review-web
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm run start:web
    envVars:
      - key: WEB_HOST
        value: 0.0.0.0
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
    buildFilter:
      paths:
        - apps/web/**
        - packages/shared/**
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - scripts/build-all.mjs
